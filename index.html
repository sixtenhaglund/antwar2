<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Antwar</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud">aim mouse &nbsp;·&nbsp; W toward cursor, S back, A/D left/right &nbsp;·&nbsp; click to dig &nbsp;·&nbsp; scroll to zoom</div>

  <!-- Main menu -->
  <div id="menu">
    <div class="ant">🐜</div>
    <h1>ANTWAR</h1>
    <p class="tag">Raise a colony. Conquer the rest.</p>

    <div class="buttons">
      <button id="playBtn" class="primary">Play</button>
      <button id="howBtn">How to play</button>
    </div>

    <div id="panel"></div>
    <div class="footer">v0.1 &nbsp;·&nbsp; made by Sixten</div>
  </div>

  <!-- Scripts load in order and share their variables -->
  <script src="input.js"></script>
  <script src="ants.js"></script>
  <script src="game.js"></script>
</body>
</html>
